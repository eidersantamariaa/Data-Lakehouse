apiVersion: v1
kind: Namespace
metadata:
  name: eider

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-config
  namespace: eider
data:
  ICEBERG_CATALOG_URI: "http://iceberg-catalog:8181"
  S3_ENDPOINT: "http://garage:3900"
  S3_REGION: "us-east-1"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-ui
  namespace: eider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-ui
  template:
    metadata:
      labels:
        app: iceberg-ui
    spec:
      containers:
      - name: ui
        image: iceberg-ui:latest
        imagePullPolicy: Never  # Usa la imagen local, sin registry
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ICEBERG_CATALOG_URI
          valueFrom:
            configMapKeyRef:
              name: ui-config
              key: ICEBERG_CATALOG_URI
        - name: S3_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ui-config
              key: S3_ENDPOINT
        - name: S3_REGION
          valueFrom:
            configMapKeyRef:
              name: ui-config
              key: S3_REGION
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---

apiVersion: v1
kind: Service
metadata:
  name: iceberg-ui
  namespace: eider
spec:
  type: LoadBalancer
  selector:
    app: iceberg-ui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    name: http
